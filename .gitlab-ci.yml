stages:
  - build
  - test
  - security
  - docs
  - docker-build

variables:
  CARGO_TERM_COLOR: always
  DOCKER_TLS_CERTDIR: "/certs"
  REGISTRY: registry.gitlab.com
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: rust:1.89-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev clang libsqlite3-dev
  script:
    - cargo build --workspace --verbose

test:
  stage: test
  image: rust:1.89-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev clang libsqlite3-dev
  script:
    - cargo test --workspace --verbose

security:
  stage: security
  image: rust:1.89-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev clang libsqlite3-dev
  script:
    - cargo install --force cargo-audit
    - cargo audit

docs:
  stage: docs
  image: rust:1.89-slim
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/registry/
      - .cargo/git/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev clang libsqlite3-dev
  script:
    - cargo doc --workspace --all-features --no-deps
  artifacts:
    paths:
      - target/doc/
    expire_in: 30 days

docker-build:
  stage: docker-build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker buildx build --push --platform linux/amd64 -t $REGISTRY/$CI_PROJECT_PATH/ingestion:$IMAGE_TAG -f apps/ingestion-service/Dockerfile apps/ingestion-service
    - docker buildx build --push --platform linux/amd64 -t $REGISTRY/$CI_PROJECT_PATH/embedding:$IMAGE_TAG -f apps/embedding-service/Dockerfile apps/embedding-service
    - docker buildx build --push --platform linux/amd64 -t $REGISTRY/$CI_PROJECT_PATH/query:$IMAGE_TAG -f apps/query-service/Dockerfile apps/query-service
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
