name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
    contents: read
    packages: write

jobs:
  cargo-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config protobuf-compiler libprotobuf-dev libsasl2-dev libssl-dev zlib1g-dev libzstd-dev
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --release -j1
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cargo-artifacts
          path: target/release/

  docker-build:
    needs: cargo-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download cargo artifacts
        uses: actions/download-artifact@v4
        with:
          name: cargo-artifacts
          path: target/release/
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Ingestion Service
        uses: docker/build-push-action@v5
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./apps/ingestion-service/Dockerfile
          push: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
          no-cache: true
          provenance: false
      - name: Build and Push Embedding Service
        uses: docker/build-push-action@v5
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./apps/embedding-service/Dockerfile
          push: true
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: ghcr.io/${{ github.repository }}/embedding:${{ github.sha }}
          no-cache: true
          provenance: false
      - name: Build and Push Query Service
        uses: docker/build-push-action@v5
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          file: ./apps/query-service/Dockerfile
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          push: true
          tags: ghcr.io/${{ github.repository }}/query:${{ github.sha }}
          no-cache: true
          provenance: false
