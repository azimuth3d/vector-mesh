name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --workspace --verbose
      - name: Run Tests
        run: cargo test --workspace --verbose
      - name: Security Audit
        run: cargo install --force cargo-audit && cargo audit
      - name: Generate Documentation
        run: cargo doc --workspace --all-features --no-deps

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Ingestion Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ingestion-service
          push: true
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
          no-cache: true
      - name: Build and Push Embedding Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/embedding-service
          push: true
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          tags: ghcr.io/${{ github.repository }}/embedding:${{ github.sha }}
          no-cache: true
      - name: Build and Push Query Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/query-service
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          push: true
          tags: ghcr.io/${{ github.repository }}/query:${{ github.sha }}
          no-cache: true
