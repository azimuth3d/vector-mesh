apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: enterprise-rag-platform/embedding-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_URI
              value: "redis://redis:6379"
            - name: QDRANT_URI
              value: "http://qdrant:6333"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
spec:
  selector:
    app: embedding-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
