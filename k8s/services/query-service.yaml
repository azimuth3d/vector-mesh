apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  labels:
    app: query-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: enterprise-rag-platform/query-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: QDRANT_URI
              value: "http://qdrant:6333"
            - name: OLLAMA_URI
              value: "http://ollama:8080"
            - name: SCYLLA_URI
              value: "scylla://scylla:9042"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: query-service
spec:
  selector:
    app: query-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
