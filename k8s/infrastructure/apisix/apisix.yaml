apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix
  namespace: rag-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apisix
  template:
    metadata:
      labels:
        app: apisix
    spec:
      containers:
      - name: apisix
        image: apache/apisix:3.9.0-debian
        ports:
        - containerPort: 9080
        - containerPort: 9443
        env:
        - name: APISIX_DEPLOYMENT_ENV
          value: "kubernetes"
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-gateway
  namespace: rag-platform
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 9080
    name: http
  - port: 443
    targetPort: 9443
    name: https
  selector:
    app: apisix
